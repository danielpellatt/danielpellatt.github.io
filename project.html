<style>
  /* This page uses the minimal Jekyll theme, whose default desktop layout
     reserves a narrow sidebar for the site title/bio.  For the project page,
     I suppress that sidebar and let the research writeup, tables, and figures
     use the full content width. */
  .wrapper {
    width: min(1180px, calc(100% - 44px));
    max-width: 1180px;
    margin: 0 auto;
  }

  .wrapper > header,
  .wrapper > footer {
    display: none;
  }

  .wrapper > section {
    width: 100%;
    max-width: none;
    float: none;
    padding-bottom: 40px;
  }

  @media print, screen and (max-width: 960px) {
    .wrapper {
      width: auto;
      max-width: none;
      margin: 0;
    }

    .wrapper > section {
      width: auto;
      float: none;
      position: static;
    }
  }
</style>
